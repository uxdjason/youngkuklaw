# glossary.yaml — 영국법 법률 용어 사전
# 용도: AI 프롬프트에 인라인 삽입하여 영/한 용어 일관성 보장
# 형식: term_en (영국식 원형) → term_ko (한국어 병기)
# 규칙 §4.1~4.3 동시 적용

style_rules:
  - "법령명·판례 citation은 영/한 페이지 모두 영문 원형 그대로. 예: s 4 Contracts Act 2015, Donoghue v Stevenson [1932] AC 562."
  - "판례 'v' 뒤에 마침표 붙이지 않음. 'Smith v Jones' O / 'Smith v. Jones' X."
  - "영국식 철자 사용: organisation, judgement, behaviour, labour, colour, favour, honour."
  - "한국어 종결은 '~다.' 형태. '~함.' '~음.' 금지. 경어(~습니다, ~세요) 금지."
  - "한국어 콤마 최소화. 꼭 필요한 경우에만."
  - "인명/지명/단체명 고유명사는 영문 원형. 예: Donoghue, House of Lords, EWCA."
  - "핵심 법률 개념은 영문+한국어 병기. 예: duty of care(주의의무), consideration(약인)."

# ─────────────────────────────────────────────
# Contract Law (계약법)
# ─────────────────────────────────────────────
